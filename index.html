<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이앤투어 결제 — 프로토타입 v1.2</title>
<style>
  :root{
    --primary:#2D6CDF;--primary-dark:#1F54B5;--bg:#F4F6FA;--card:#fff;
    --text:#1A1E27;--sub:#7B8494;--line:#E5E9F0;--danger:#E5484D;--success:#18A058;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;}
  body{background:#E9EDF3;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px;}
  h1{font-size:18px;color:var(--text);margin-bottom:4px;}
  .sub{font-size:13px;color:var(--sub);margin-bottom:14px;}
  .cases{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px;max-width:820px;}
  .cases button{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 14px;font-size:13px;color:var(--text);cursor:pointer;}
  .cases button.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .badge{font-size:12px;color:var(--sub);margin-bottom:12px;min-height:16px;text-align:center;max-width:700px;}
  .phone{width:375px;height:740px;background:#111;border-radius:44px;padding:12px;box-shadow:0 24px 60px rgba(0,0,0,.28);}
  .screen{width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;position:relative;}
  .statusbar{height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:12px;font-weight:600;color:var(--text);flex:none;}
  .content{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:8px 20px 22px;}
  .content::-webkit-scrollbar{display:none;}
  .title{font-size:22px;font-weight:700;line-height:1.35;margin:18px 0 6px;}
  .desc{font-size:14px;color:var(--sub);line-height:1.5;}
  .spacer{flex:1;}
  .btn{width:100%;padding:16px;border:none;border-radius:14px;background:var(--primary);color:#fff;font-size:16px;font-weight:600;cursor:pointer;}
  .btn:disabled{background:#C3CBD9;cursor:default;}
  .btn.ghost{background:#EDF1F7;color:var(--text);}
  .btn.danger{background:var(--danger);}
  .btn+.btn{margin-top:10px;}
  .field{margin-top:14px;}
  .field label{font-size:12px;color:var(--sub);display:block;margin-bottom:5px;}
  .field input{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;background:#fff;color:var(--text);outline:none;}
  .field input:focus{border-color:var(--primary);}
  .row{display:flex;gap:10px;}
  .row .field{flex:1;}
  .link{font-size:13px;color:var(--sub);text-decoration:underline;background:none;border:none;cursor:pointer;padding:8px;}
  .center{text-align:center;}
  .error{color:var(--danger);font-size:13px;margin-top:8px;text-align:center;min-height:18px;}
  /* keypad */
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;background:#fff;border-radius:18px;padding:10px;}
  .keypad button{padding:14px;font-size:22px;font-weight:600;border:none;background:none;border-radius:12px;cursor:pointer;color:var(--text);}
  .keypad button:active{background:#EDF1F7;}
  .keypad .fn{font-size:14px;color:var(--sub);}
  /* misc layout */
  .logo{width:60px;height:60px;border-radius:16px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;margin:0 auto;}
  .spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--primary);border-radius:50%;margin:20px auto 0;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .card-ui{background:#fff;border-radius:16px;padding:16px;border:1px solid var(--line);}
  .card-ui+.card-ui{margin-top:10px;}
  .amount{font-size:34px;font-weight:800;text-align:center;margin:8px 0;}
  .merchant-name{font-size:15px;color:var(--sub);text-align:center;margin-top:20px;}
  .success-icon{width:72px;height:72px;border-radius:50%;background:var(--success);color:#fff;font-size:36px;display:flex;align-items:center;justify-content:center;margin:28px auto 14px;}
  .fail-icon{width:72px;height:72px;border-radius:50%;background:var(--danger);color:#fff;font-size:36px;display:flex;align-items:center;justify-content:center;margin:28px auto 14px;}
  .receipt-row{display:flex;justify-content:space-between;font-size:14px;padding:9px 0;border-bottom:1px dashed var(--line);}
  .receipt-row span:first-child{color:var(--sub);}
  .store{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
  .store:last-child{border-bottom:none;}
  .store .ico{width:42px;height:42px;border-radius:12px;background:#EDF1F7;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none;}
  .store .info{flex:1;min-width:0;}
  .store .nm{font-size:14px;font-weight:600;}
  .store .meta{font-size:12px;color:var(--sub);margin-top:2px;}
  .store .nav-btn{font-size:12px;color:var(--primary);border:1px solid var(--primary);background:#fff;border-radius:14px;padding:5px 10px;cursor:pointer;flex:none;}
  .pill-tabs{display:flex;gap:8px;overflow-x:auto;margin:10px 0;}
  .pill-tabs button{border:1px solid var(--line);background:#fff;border-radius:16px;padding:6px 14px;font-size:13px;color:var(--sub);cursor:pointer;flex:none;}
  .pill-tabs button.on{background:var(--text);color:#fff;border-color:var(--text);}
  .hist{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer;}
  .hist:last-child{border-bottom:none;}
  .hist .l .nm{font-size:15px;font-weight:600;}
  .hist .l .meta{font-size:12px;color:var(--sub);margin-top:3px;}
  .hist .amt{font-size:15px;font-weight:700;}
  .hist.cancel .nm,.hist.cancel .amt{color:#A8B0BE;text-decoration:line-through;}
  .month-label{font-size:12px;color:var(--sub);margin:14px 0 6px;}
  .topbar{display:flex;align-items:center;gap:8px;padding:6px 0 4px;}
  .topbar .back{border:none;background:none;font-size:22px;cursor:pointer;color:var(--text);padding:4px 10px 4px 0;}
  .topbar .t{font-size:16px;font-weight:700;}
  .map{height:120px;border-radius:14px;background:linear-gradient(135deg,#DCE7F7,#EAF1E4);display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:13px;margin-top:10px;}
  .home-card{background:linear-gradient(135deg,var(--primary),#5B8DEF);border-radius:18px;padding:20px;color:#fff;}
  .home-card .cardname{font-size:13px;opacity:.85;}
  .home-card .cardnum{font-size:17px;font-weight:700;margin-top:6px;letter-spacing:.5px;}
  .home-card .manage{margin-top:14px;font-size:12px;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:12px;padding:6px 12px;cursor:pointer;}
  .section-t{font-size:15px;font-weight:700;margin:18px 0 8px;}
  .sms-box{display:flex;gap:8px;justify-content:center;margin:14px 0 4px;}
  .sms-box .d{width:42px;height:52px;border:1.5px solid var(--line);border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;}
  .sms-box .d.on{border-color:var(--primary);}
  .timer{font-size:13px;color:var(--danger);text-align:center;}
  .note{font-size:12px;color:var(--sub);background:#EDF1F7;border-radius:10px;padding:10px 12px;margin-top:12px;line-height:1.6;}
  .flow-tag{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(26,30,39,.75);color:#fff;font-size:10px;padding:3px 10px;border-radius:10px;z-index:5;pointer-events:none;}
  /* choice cards */
  .choice-card{border:1.5px solid var(--line);border-radius:16px;padding:18px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .15s;}
  .choice-card+.choice-card{margin-top:10px;}
  .choice-card:active{border-color:var(--primary);}
  .choice-card .cc-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;}
  .choice-card .cc-body{flex:1;}
  .choice-card .cc-title{font-size:15px;font-weight:700;margin-bottom:3px;}
  .choice-card .cc-desc{font-size:12px;color:var(--sub);line-height:1.5;}
  .divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--sub);font-size:12px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line);}
  /* merchant info card */
  .merchant-card{background:linear-gradient(135deg,#F0F5FF,#F4F6FA);border:1px solid #D6E4FF;border-radius:16px;padding:14px 16px;margin-bottom:4px;display:flex;align-items:center;gap:12px;}
  .merchant-card .m-icon{width:44px;height:44px;border-radius:12px;background:var(--primary);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;flex:none;}
  .merchant-card .m-info .m-name{font-size:15px;font-weight:700;}
  .merchant-card .m-info .m-amt{font-size:20px;font-weight:800;color:var(--primary);margin-top:2px;}
  .merchant-card .m-info .m-type{font-size:12px;color:var(--sub);margin-top:2px;}
  /* social buttons */
  .social-btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
  /* PG payment option cards */
  .pg-card{border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:13px;}
  .pg-card+.pg-card{margin-top:10px;}
  .pg-card:active{border-color:var(--primary);}
  .pg-logo{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex:none;}
</style>
</head>
<body>
<h1>페이앤투어 결제 — 인터랙티브 프로토타입</h1>
<div class="sub">케이스 버튼을 클릭해 시나리오를 선택하고 휴대폰 화면에서 직접 클릭하며 플로우를 체험하세요 (v1.2)</div>
<div class="cases" id="caseBtns">
  <button data-case="A">A. 로그인 필요 (금액 고정)</button>
  <button data-case="B">B. 재방문 (로그인 유지)</button>
  <button data-case="C">C. 로그인 필요 (금액 직접 입력)</button>
  <button data-case="D1">예외1. 결제 실패 (한도 초과)</button>
  <button data-case="D3">예외2. 무효 QR</button>
  <button data-case="E">홈 / 내역 / 가맹점 둘러보기</button>
</div>
<div class="badge" id="badge"></div>

<div class="phone">
  <div class="screen">
    <div class="flow-tag" id="flowTag"></div>
    <div class="statusbar"><span id="clock">12:30</span><span>📶 LTE 🔋</span></div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const content=$('#content'), badge=$('#badge'), flowTag=$('#flowTag');
let st={};

const CASES={
  A:{label:'케이스 A — 로그인 필요 (금액 고정): QR → 로그인/가입 → 카드 등록 → 결제', cookie:false, registered:false, merchant:'OO식당', amount:23000, qrType:'order'},
  B:{label:'케이스 B — 재방문 (로그인 유지): QR → 바로 결제 확인 → 결제', cookie:true, registered:true, merchant:'△△카페', amount:4500, qrType:'order', cardNickname:'내 신한카드'},
  C:{label:'케이스 C — 로그인 필요 (금액 직접 입력): QR → 로그인/가입 → 카드 등록 → 금액 입력 → 결제', cookie:false, registered:false, merchant:'△△카페', amount:0, qrType:'fixed'},
  D1:{label:'예외 1 — 결제 실패(한도 초과): 다른 카드로 재시도', cookie:true, registered:true, merchant:'OO식당', amount:1500000, qrType:'order', failOnce:true},
  D3:{label:'예외 2 — 유효하지 않은/만료된 QR'},
  E:{label:'둘러보기 — 홈(S-11) / 결제내역(S-12·13) / 가맹점(S-14) / 카드 관리(S-15)'}
};

const NEARBY=[
  {icon:'☕',name:'△△카페',meta:'카페 · 120m'},
  {icon:'🍜',name:'□□식당',meta:'음식점 · 250m'},
  {icon:'🛒',name:'◇◇마트',meta:'마트 · 400m'},
  {icon:'🍞',name:'○○베이커리',meta:'카페 · 520m'},
  {icon:'🍱',name:'◎◎분식',meta:'음식점 · 610m'}
];

function setCase(c){
  document.querySelectorAll('#caseBtns button').forEach(b=>b.classList.toggle('active',b.dataset.case===c));
  st={case:c,...(CASES[c]||{}),
    cardIdx:0, enteredAmount:(CASES[c]?.amount||0),
    smsLen:0, pgProvider:'', cardNickname:'', finalAmt:0, payFailed:false};
  badge.textContent=CASES[c]?.label||'';
  if(st.smsTimer){clearInterval(st.smsTimer);st.smsTimer=null;}
  if(c==='E'){go('home');return;}
  if(c==='D3'){go('landingInvalid');return;}
  go('landing');
}
document.querySelectorAll('#caseBtns button').forEach(b=>b.onclick=()=>setCase(b.dataset.case));

function go(name){if(screens[name])screens[name]();}
function render(tag,html){flowTag.textContent=tag;content.innerHTML=html;}
function won(n){return (n||0).toLocaleString('ko-KR')+'원';}
function goStorePayment(name){
  // 근처 가맹점 클릭 → 로그인 유지 + 금액 직접 입력 결제창
  st.merchant=name; st.qrType='fixed'; st.enteredAmount=0;
  st.cookie=true; st.registered=true;
  go('confirm');
}

const screens={

/* ───────── S-01 랜딩 ───────── */
landing(){
  render('S-01 QR 진입 / 랜딩',`
    <div class="spacer"></div>
    <div class="logo">P&T</div>
    <div class="center" style="margin-top:14px;font-size:18px;font-weight:700;">페이앤투어 결제</div>
    <div class="spinner"></div>
    <div class="center desc" style="margin-top:14px;">가맹점 확인 중…<br><b style="color:var(--text)">${st.merchant||''}</b>에서 결제를 시작합니다</div>
    <div class="spacer"></div>`);
  const snap=st;
  setTimeout(()=>{
    if(st!==snap)return;
    if(st.cookie&&st.registered) go('confirm');   // 재방문 쿠키 → 바로 결제
    else if(st.guest) go('guestPaySelect');       // 비회원 케이스
    else go('memberChoice');                      // 신규 / 다른 기기
  },1400);
},

/* S-01 무효 QR */
landingInvalid(){
  render('S-01 무효 QR',`
    <div class="spacer"></div>
    <div class="fail-icon" style="font-size:30px;">!</div>
    <div class="center title" style="margin:0 0 6px;">유효하지 않은 QR입니다</div>
    <div class="center desc">QR코드가 만료되었거나 등록되지 않은<br>가맹점입니다. 매장 직원에게 문의해주세요.</div>
    <div class="spacer"></div>
    <button class="btn ghost">다시 스캔하기</button>
    <div class="center" style="margin-top:10px;"><button class="link">고객센터 1588-0000</button></div>`);
},

/* ───────── S-01b 메인 (가맹점 진입) ───────── */
memberChoice(){
  const hasAmt=st.amount>0;
  render('S-01b 메인',`
    <div style="height:16px;"></div>

    <!-- 로고 + 가맹점 -->
    <div style="text-align:center;margin-bottom:4px;">
      <div class="logo" style="width:56px;height:56px;border-radius:15px;font-size:20px;margin-bottom:12px;">P&T</div>
      <div style="font-size:13px;color:var(--sub);">결제 요청</div>
      <div style="font-size:26px;font-weight:800;margin-top:4px;">${st.merchant}</div>
      ${hasAmt
        ?`<div style="font-size:36px;font-weight:800;color:var(--primary);margin-top:4px;">${won(st.amount)}</div>`
        :`<div style="font-size:13px;color:var(--sub);margin-top:4px;">금액은 다음 단계에서 입력</div>`}
    </div>

    <div style="height:20px;"></div>

    <!-- 소셜 로그인 버튼 -->
    <button class="social-btn" style="background:#FEE500;color:#3A1D1D;padding:11px;"
      onclick="st.pgProvider='kakao';go('socialLoading')">
      <span style="font-size:17px;">💬</span> 카카오톡으로 계속하기
    </button>
    <button class="social-btn" style="background:#03C75A;color:#fff;margin-top:6px;padding:11px;"
      onclick="st.pgProvider='naver';go('socialLoading')">
      <span style="font-size:15px;font-weight:900;font-family:Georgia,serif;">N</span> 네이버로 계속하기
    </button>
    <button class="btn ghost" onclick="go('emailSignup')" style="margin-top:6px;padding:11px;font-size:14px;">
      이메일로 계속하기
    </button>

    <div class="divider" style="margin:10px 0 6px;">비회원</div>

    <button onclick="go('guestPaySelect')"
      style="width:100%;padding:10px;border:1.5px solid var(--line);border-radius:14px;background:#fff;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;">
      비회원 결제
    </button>

`);
},

/* ───────── S-02 소셜 로그인 ───────── */
socialLogin(){
  const isDiffDevice=st.registered&&!st.cookie;
  render('S-02 소셜 로그인',`
    ${isDiffDevice?`
    <div style="background:#FFF4E5;border-radius:12px;padding:10px 14px;margin-top:6px;display:flex;gap:10px;align-items:flex-start;">
      <span style="font-size:18px;flex:none;">🔐</span>
      <div style="font-size:13px;color:#B45309;line-height:1.5;"><b>새로운 기기에서 접근</b><br>본인 확인을 위해 소셜 계정으로 로그인해주세요.</div>
    </div>`:''}
    <div class="logo" style="margin-top:${isDiffDevice?16:28}px;"></div>
    <div class="center" style="margin-top:12px;font-size:20px;font-weight:700;">페이앤투어</div>
    <div class="center desc" style="margin-top:5px;">소셜 계정으로 간편하게 ${isDiffDevice?'로그인':'가입 및 로그인'}하세요</div>

    <div style="margin-top:26px;">
      <button class="social-btn" style="background:#FEE500;color:#3A1D1D;"
        onclick="st.pgProvider='kakao';go('socialLoading')">
        <span style="font-size:20px;">💬</span> 카카오톡으로 계속하기
      </button>
      <button class="social-btn" style="background:#03C75A;color:#fff;margin-top:10px;"
        onclick="st.pgProvider='naver';go('socialLoading')">
        <span style="font-size:17px;font-weight:900;font-family:Georgia,serif;">N</span> 네이버로 계속하기
      </button>
    </div>

    <div class="divider" style="margin:20px 0 6px;">또는</div>
    <div class="center">
      <button onclick="go('emailSignup')" style="font-size:13px;color:var(--sub);text-decoration:underline;background:none;border:none;cursor:pointer;padding:8px;">
        이메일로 가입하기
      </button>
    </div>
    <div class="spacer"></div>
    <button class="btn ghost" onclick="go('memberChoice')">돌아가기</button>`);
},

/* 소셜 로그인 처리 중 */
socialLoading(){
  const isKakao=st.pgProvider==='kakao';
  const nm=isKakao?'카카오':'네이버';
  render('소셜 로그인 처리 중',`
    <div class="spacer"></div>
    <div style="width:64px;height:64px;border-radius:18px;background:${isKakao?'#FEE500':'#03C75A'};color:${isKakao?'#3A1D1D':'#fff'};display:flex;align-items:center;justify-content:center;font-size:${isKakao?'26':'30'}px;font-weight:900;font-family:${isKakao?'inherit':'Georgia,serif'};margin:0 auto;">
      ${isKakao?'💬':'N'}
    </div>
    <div class="center desc" style="margin-top:16px;">${nm} 계정으로<br>로그인 중입니다…</div>
    <div class="spinner" style="border-top-color:${isKakao?'#B8900A':'#03C75A'};"></div>
    <div class="spacer"></div>`);
  const snap=st;
  setTimeout(()=>{
    if(st!==snap)return;
    if(st.registered) go('confirm');  // 기존 회원 → 바로 결제

card(){
  render('S-06 카드 등록',`

      <div class="field"><label>CVC</label><input id="cv" type="password" placeholder="●●●" maxlength="3"></div>
    </div>
    <div class="row">
      <div class="field"><label>카드 비밀번호 앞 2자리</label><input id="p2" type="password" placeholder="●●" maxlength="2"></div>
      <div class="field"><label>생년월일 6자리</label><input id="bd" inputmode="numeric" placeholder="901225" maxlength="6" value="901225" disabled style="background:#EDF1F7;color:var(--sub);"></div>
    </div>
    <div class="note">카드 정보는 코페이PG에 토큰화 저장되며 페이앤투어 서버에는 보관되지 않습니다.</div>
    <div class="spacer"></div>
    <button class="btn" id="next" disabled>등록하기</button>`);
  const nick=$('#nickname'),cn=$('#cn'),ex=$('#ex'),cv=$('#cv'),p2=$('#p2'),next=$('#next');
  const chk=()=>{ next.disabled=!(nick.value.trim().length>0&&cn.value.replace(/\D/g,'').length===16&&ex.value.length===5&&cv.value.length===3&&p2.value.length===2); };
  nick.oninput=chk;
  cn.oninput=()=>{let v=cn.value.replace(/\D/g,'').slice(0,16);cn.value=v.match(/.{1,4}/g)?.join('-')||'';chk();};
  ex.oninput=()=>{let v=ex.value.replace(/\D/g,'').slice(0,4);ex.value=v.length>2?v.slice(0,2)+'/'+v.slice(2):v;chk();};
  cv.oninput=p2.oninput=chk;
  next.onclick=()=>{ st.cardNickname=nick.value.trim(); go('confirm'); };
},

/* ───────── S-07 결제 확인 ───────── */
confirm(){
  const fixed=st.qrType==='fixed';
  const baseAmt=fixed?st.enteredAmount:st.amount;
  const cardLabel=st.cardIdx===0?(st.cardNickname||'신한카드 1234'):'국민카드 5678';
  const cardColor=st.cardIdx===0?'var(--primary)':'#18A058';
  render(`S-07 결제 확인${fixed?' (고정형 QR)':''}`,`
    <div class="merchant-name">${st.merchant}</div>
    ${fixed
      ?`<div class="amount" style="color:${baseAmt?'var(--text)':'#C3CBD9'};">${baseAmt?won(baseAmt):'금액을 입력하세요'}</div>
        <div class="center desc" style="font-size:12px;margin-bottom:4px;">매장에 안내된 금액을 직접 입력해주세요</div>`
      :`<div class="amount">${won(baseAmt)}</div>`}

    <div class="card-ui" style="display:flex;align-items:center;gap:12px;cursor:pointer;" onclick="st.cardIdx=(st.cardIdx+1)%2;go('confirm')">
      <div style="width:44px;height:28px;border-radius:6px;background:${cardColor};"></div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:600;">${cardLabel}</div>
        <div style="font-size:12px;color:var(--sub);">${st.cardIdx===0?'대표 카드':'두 번째 카드'}</div>
      </div>
      <div style="color:var(--sub);font-size:13px;">변경 ▾</div>
    </div>

    ${fixed?`
    <div class="keypad" id="amtKp" style="margin-top:12px;">
      ${[1,2,3,4,5,6,7,8,9,'⌫',0,'00'].map(v=>`<button data-v="${v}" class="${v==='⌫'?'fn':''}">${v}</button>`).join('')}
    </div>
    <button class="btn" id="pay" style="margin-top:12px;" ${!baseAmt?'disabled':''}>${baseAmt>0?won(baseAmt)+' ':''}결제하기</button>
    `:`
    <div class="spacer"></div>
    <button class="btn" id="pay">${won(baseAmt)} 결제하기</button>
    <div class="spacer"></div>
    `}`);

  if(fixed){
    document.querySelectorAll('#amtKp button').forEach(b=>b.onclick=()=>{
      const v=b.dataset.v; let a=String(st.enteredAmount||'');
      if(v==='⌫') a=a.slice(0,-1);
      else if(a.length<7) a+=String(v);
      st.enteredAmount=parseInt(a)||0; go('confirm');
    });
  }
  $('#pay').onclick=()=>{ st.finalAmt=fixed?st.enteredAmount:st.amount; go('processing'); };
},

    <div class="topbar"><button class="back" onclick="go('guestPaySelect')">‹</button><div class="t">카드 직접 입력</div></div>
    <div class="merchant-card" style="margin-top:4px;">
      <div class="m-icon">🍽</div>
      <div class="m-info">
        <div class="m-name">${st.merchant}</div>
        <div class="m-amt">${won(st.amount)}</div>
      </div>
    </div>
    <div class="field" style="margin-top:12px;"><label>카드번호</label><input id="cn" inputmode="numeric" placeholder="0000-0000-0000-0000" maxlength="19"></div>
    <div class="row">
      <div class="field"><label>유효기간</label><input id="ex" placeholder="MM/YY" maxlength="5"></div>
      <div class="field"><label>CVC</label><input id="cv" type="password" placeholder="●●●" maxlength="3"></div>
    </div>
    <div class="row">
      <div class="field"><label>카드 비밀번호 앞 2자리</label><input id="p2" type="password" placeholder="●●" maxlength="2"></div>
      <div class="field"><label>생년월일 6자리</label><input id="bd" inputmode="numeric" placeholder="901225" maxlength="6"></div>
    </div>
    <div class="note">🔒 카드 정보는 카드사 인증 후 PG사에서 처리되며 어디에도 저장되지 않습니다.</div>
    <div class="spacer"></div>
    <button class="btn" id="next" disabled>${won(st.amount)} 인증 결제하기</button>`);
  const cn=$('#cn'),ex=$('#ex'),cv=$('#cv'),p2=$('#p2'),bd=$('#bd'),next=$('#next');
  const chk=()=>{ next.disabled=!(cn.value.replace(/\D/g,'').length===16&&ex.value.length===5&&cv.value.length===3&&p2.value.length===2&&bd.value.length===6); };
  cn.oninput=()=>{let v=cn.value.replace(/\D/g,'').slice(0,16);cn.value=v.match(/.{1,4}/g)?.join('-')||'';chk();};
  ex.oninput=()=>{let v=ex.value.replace(/\D/g,'').slice(0,4);ex.value=v.length>2?v.slice(0,2)+'/'+v.slice(2):v;chk();};
  cv.oninput=p2.oninput=bd.oninput=chk;
  next.onclick=()=>go('guestPGAuth');
},

/* F2 — 카드사 SMS 인증 */
guestPGAuth(){
  st.smsLen=0;
  render('F2 — 카드사 SMS 인증',`
    <div class="topbar"><button class="back" onclick="go('guestCard')">‹</button><div class="t">카드사 인증</div></div>
    <div style="background:#EEF4FF;border-radius:12px;padding:11px 14px;margin-top:4px;font-size:13px;color:var(--primary);line-height:1.6;">
      <b>카드사 본인인증 문자 발송</b><br>
      카드에 등록된 휴대폰으로 6자리 인증번호를 발송했습니다.
    </div>
    <div class="title" style="font-size:18px;margin-top:16px;">인증번호 6자리를<br>입력해주세요</div>
    <div class="sms-box" id="smsBox">${[...Array(6)].map(()=>'<div class="d"></div>').join('')}</div>
    <div class="timer" id="tmr">03:00</div>
    <div class="center" style="margin-top:4px;"><button class="link" id="resend">인증번호 재발송</button></div>
    <div class="spacer"></div>
    <div class="keypad" id="kp">
      ${[1,2,3,4,5,6,7,8,9,'⌫',0,'C'].map(v=>`<button data-v="${v}" class="${v==='⌫'||v==='C'?'fn':''}">${v}</button>`).join('')}
    </div>`);
  let t=180; const tmr=$('#tmr');
  if(st.smsTimer) clearInterval(st.smsTimer);
  st.smsTimer=setInterval(()=>{
    t--;
    if(t<0){clearInterval(st.smsTimer);st.smsTimer=null;tmr.textContent='시간 만료 — 재발송해주세요';return;}
    tmr.textContent=`0${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}`;
  },1000);
  $('#resend').onclick=()=>{t=180;};
  const box=$('#smsBox').children;
  document.querySelectorAll('#kp button').forEach(b=>b.onclick=()=>{
    const v=b.dataset.v;
    if(v==='⌫'){if(st.smsLen>0){st.smsLen--;box[st.smsLen].textContent='';box[st.smsLen].classList.remove('on');}return;}
    if(v==='C'){st.smsLen=0;[...box].forEach(d=>{d.textContent='';d.classList.remove('on');});return;}
    if(st.smsLen<6){
      box[st.smsLen].textContent=v; box[st.smsLen].classList.add('on'); st.smsLen++;
      if(st.smsLen===6){
        clearInterval(st.smsTimer); st.smsTimer=null;
        setTimeout(()=>go('guestProcessing'),300);
      }
    }
  });
},
